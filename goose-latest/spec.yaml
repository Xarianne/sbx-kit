schemaVersion: "1"
kind: sandbox
name: goose-latest
displayName: Goose AI Agent (Latest)
description: "Block's AI coding agent -- always pulls the latest release"
sandbox:
  image: "docker/sandbox-templates:shell-docker"
  aiFilename: GOOSE.md
  entrypoint:
    run: [goose]
environment:
  variables:
    OLLAMA_HOST: http://host.docker.internal:11434
    # GH_TOKEN: set via Docker Sandbox masked env vars, never committed
commands:
  install:
    - command: apt-get update -qq -y && apt-get install -qq -y git gh
      description: Install git and GitHub CLI
    - command: curl -fsSL https://github.com/aaif-goose/goose/releases/latest/download/goose-x86_64-unknown-linux-gnu.tar.gz | tar xz -C /usr/local/bin
      description: Install latest goose release
    - command: mkdir -p /home/agent/.config/goose
      description: Create goose config directory
    - command: |
        cat > /home/agent/.config/goose/config.yaml << 'GOOSE_CONFIG'
        GOOSE_TELEMETRY_ENABLED: false
        active_provider: ollama
        providers:
          ollama:
            enabled: true
            model: deepseek-v4-flash:cloud
            configured: true
        GOOSE_MODE: approve
        GOOSE_MAX_TURNS: 20
        extensions:
          developer:
            enabled: true
            type: platform
            name: developer
            description: Write and edit files, and execute shell commands
            display_name: Developer
            bundled: true
            available_tools: []
          skills:
            enabled: true
            type: platform
            name: skills
            description: Discover and provide skill instructions from filesystem and builtins
            display_name: Skills
            bundled: true
            available_tools: []
          memory:
            enabled: true
            type: builtin
            name: memory
            description: Teach goose your preferences as you go.
            display_name: Memory
            timeout: 300
            bundled: true
            available_tools: []
          code_execution:
            enabled: true
            type: platform
            name: code_execution
            description: Goose will make extension calls through code execution, saving tokens
            display_name: Code Mode
            bundled: true
            available_tools: []
          todo:
            enabled: true
            type: platform
            name: todo
            description: Enable a todo list for goose so it can keep track of what it is doing
            display_name: Todo
            bundled: true
            available_tools: []
          chatrecall:
            enabled: true
            type: platform
            name: chatrecall
            description: Search past conversations and load session summaries for contextual memory
            display_name: Chat Recall
            bundled: true
            available_tools: []
          summon:
            enabled: true
            type: platform
            name: summon
            description: Load knowledge and delegate tasks to subagents
            display_name: Summon
            bundled: true
            available_tools: []
          extensionmanager:
            enabled: true
            type: platform
            name: Extension Manager
            description: Enable extension management tools for discovering, enabling, and disabling extensions
            display_name: Extension Manager
            bundled: true
            available_tools: []
          tom:
            enabled: true
            type: platform
            name: tom
            description: Inject custom context into every turn via GOOSE_MOIM_MESSAGE_TEXT and GOOSE_MOIM_MESSAGE_FILE environment variables
            display_name: Top Of Mind
            bundled: true
            available_tools: []
        GOOSE_CONFIG
      description: Pre-configure goose with Ollama provider pointing to host
    - command: chown -R agent:agent /home/agent/.config/goose
      description: Fix ownership of goose config to agent user
    - command: |
        cat > /home/agent/.config/goose/permission.yaml << 'PERMISSION_YAML'
        smart_approve:
          always_allow: []
          ask_before: []
          never_allow: []
        user:
          always_allow:
          - shell
          - edit
          - write
          - execute_typescript
          - load_skill
          - load
          - delegate
          ask_before: []
          never_allow: []
        PERMISSION_YAML
      description: Pre-create permission.yaml to prevent crash on first write
    - command: chown agent:agent /home/agent/.config/goose/permission.yaml
      description: Fix ownership of permission.yaml
